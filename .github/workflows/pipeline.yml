name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Lint Check
      run: |
        pip install flake8
        flake8 . || true

    - name: Run Tests
      run: echo "No tests added yet"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin 405464371687.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker Image
      run: docker build -t my-devops-app .

    - name: Tag Image
      run: |
        docker tag my-devops-app:latest 405464371687.dkr.ecr.us-east-1.amazonaws.com/my-devops-app:${{ github.sha }}

    - name: Push Image
      run: |
        docker push 405464371687.dkr.ecr.us-east-1.amazonaws.com/my-devops-app:${{ github.sha }}
